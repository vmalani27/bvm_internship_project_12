name: Deploy Flutter Web to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ALB URL from CloudFormation
        id: get-alb
        run: |
          ALB_URL=$(aws cloudformation describe-stacks \
            --stack-name inspection-api-backend-resources \
            --query "Stacks[0].Outputs[?OutputKey=='ALBDNSName'].OutputValue" \
            --output text)

          echo "BACKEND_URL=http://$ALB_URL" >> $GITHUB_ENV

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Build Web Release
        run: |
          flutter build web --release \
            --dart-define=BACKEND_URL=${{ env.BACKEND_URL }}
        working-directory: frontend

      - name: Sync to S3
        run: |
          aws s3 sync frontend/build/web s3://${{ secrets.AWS_S3_BUCKET }} --delete
