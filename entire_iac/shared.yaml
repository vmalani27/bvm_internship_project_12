AWSTemplateFormatVersion: '2010-09-09'
Description: Shared Resources Stack for PCBias Inspection App

Parameters:

  ProjectName:
    Type: String
    Default: pcbias
    Description: Short prefix applied to every resource name

Resources:

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-inspection-api
      ImageScanningConfiguration:
        ScanOnPush: true

  VideoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-videos
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireExports
            Status: Enabled
            Prefix: exports/
            ExpirationInDays: 30

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-frontend
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${FrontendBucket}/*
          - Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !Sub arn:aws:s3:::${FrontendBucket}
              - !Sub arn:aws:s3:::${FrontendBucket}/*
            Condition:
              Bool:
                aws:SecureTransport: false

Outputs:

  ECRRepositoryURL:
    Value: !GetAtt ECRRepository.RepositoryUri

  VideoBucketName:
    Value: !Ref VideoBucket